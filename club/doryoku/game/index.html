<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイクラ風FPS</title>
    <!-- スタイルシートを読み込む -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ゲーム全体のルートコンテナ -->
    <div id="game-container">

        <!-- Three.jsがここに描画するWebGLキャンバス -->
        <canvas id="game-canvas"></canvas>

        <!-- ダメージを受けたときに赤くフラッシュするオーバーレイ -->
        <div id="damage-flash"></div>

        <!-- 照準（クロスヘア）と弓チャージバー -->
        <div id="crosshair">
            <!-- 中央に円＋十字線の照準を表示 -->
            <div class="reticle"></div>
            <!-- 弓を溜めているときにチャージ量をバーで表示 -->
            <div id="charge-bar-container">
                <div id="charge-bar"></div>
            </div>
        </div>

        <!-- HUD（ゲーム中に常時表示されるUI）-->
        <div id="hud">

            <!-- HPバーとHP数値（左下）-->
            <div id="hp-ui">
                <div id="hp-bar-container">
                    <!-- HPに応じて幅が変化するバー（緑→オレンジ→赤）-->
                    <div id="hp-bar-fill"></div>
                </div>
                <span id="hp-value">100</span>
            </div>

            <!-- ホットバー（画面下部中央）: スロット0〜1が特殊・2〜7が通常 -->
            <div id="hotbar-container">
                <div id="hotbar">
                    <!-- スロット0: 弓（special = 青い枠の特殊スロット）-->
                    <div class="slot special" data-index="0">
                        <span class="icon">🏹</span>
                        <span class="count" id="hotbar-durability">20</span>
                    </div>
                    <!-- スロット1: 矢 -->
                    <div class="slot special" data-index="1">
                        <span class="icon">⤅</span>
                        <span class="count" id="hotbar-ammo">20</span>
                    </div>
                    <!-- 視覚的な区切り線 -->
                    <div class="hotbar-separator"></div>
                    <!-- スロット2〜7: 汎用アイテムスロット（初期は空）-->
                    <div class="slot selected" data-index="2"><span class="icon"></span><span class="count"></span>
                    </div>
                    <div class="slot" data-index="3"><span class="icon"></span><span class="count"></span></div>
                    <div class="slot" data-index="4"><span class="icon"></span><span class="count"></span></div>
                    <div class="slot" data-index="5"><span class="icon"></span><span class="count"></span></div>
                    <div class="slot" data-index="6"><span class="icon"></span><span class="count"></span></div>
                    <div class="slot" data-index="7"><span class="icon"></span><span class="count"></span></div>
                </div>
            </div>

            <!-- デバッグ情報: プレイヤーの現在XYZ座標を表示（左上）-->
            <div id="debug-info">XYZ: 0.00 / 0.00 / 0.00</div>

        </div><!-- /#hud -->

        <!-- オーバーレイスクリーン群（.active クラスで表示される）-->

        <!-- タイトル画面（初回・ESC時に表示）-->
        <div id="title-screen" class="screen active">
            <h1>マイクラ風FPSゲーム</h1>
            <p>Click to Start</p>
            <p class="controls">WASD: 移動 | Mouse: 視点移動 | Space: ジャンプ</p>
            <p class="controls">右クリック: 弓を溜めて撃つ | ブロックの設置<br>左クリック: ブロックの破壊</p>
            <p class="controls">1-8: アイテム選択 | Esc: メニュー</p>
        </div>

        <!-- ゲームオーバー画面（HP0になったとき表示）-->
        <div id="game-over-screen" class="screen">
            <h1>GAME OVER</h1>
            <p id="final-score">Score: 0</p>
            <p>Click to Restart</p>
        </div>

    </div><!-- /#game-container -->

    <!-- ES Module Shims: importmapをサポートしていないブラウザ向けのポリフィル -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <!-- importmap: "three" という名前でThree.jsをCDNから読み込めるように設定 -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>

    <!-- Socket.IO: サーバーが提供するマルチプレイヤー通信ライブラリ -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- メインゲームスクリプト（ES Module形式）-->
    <script type="module" src="game.js"></script>

</body>

</html>
